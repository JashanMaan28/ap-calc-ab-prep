<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Calculus AB Prep</title>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    svg: { fontCache: 'global' }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    /* Light theme тАФ late-afternoon study scene, paper warmed by a window */
    --bg:oklch(0.985 0.005 65);
    --paper:oklch(0.975 0.008 60);
    --card:oklch(0.998 0.003 60);
    --ink:oklch(0.235 0.022 40);
    --ink-soft:oklch(0.36 0.022 40);
    --muted:oklch(0.52 0.020 40);
    --line:oklch(0.91 0.010 45);
    --line-strong:oklch(0.85 0.013 45);

    --brand:oklch(0.66 0.175 40);
    --brand-deep:oklch(0.56 0.180 35);
    --brand-tint:oklch(0.94 0.045 45);
    --brand-tint-strong:oklch(0.88 0.080 42);
    --brand-ink:oklch(0.40 0.165 38);

    --ember:oklch(0.83 0.150 86);
    --ember-deep:oklch(0.70 0.175 70);
    --ember-tint:oklch(0.96 0.060 88);

    --good:oklch(0.62 0.135 148);
    --bad:oklch(0.62 0.165 22);
    --warn:oklch(0.76 0.145 78);

    --choice-bg:var(--card);
    --choice-hover:oklch(0.97 0.025 45);
    --choice-selected:oklch(0.94 0.065 42);
    --feedback-good:oklch(0.95 0.055 148);
    --feedback-bad:oklch(0.96 0.045 22);

    --soft:oklch(0.95 0.040 45);
    --soft-text:var(--brand-ink);

    --pill-calc-bg:oklch(0.94 0.060 70);
    --pill-calc-text:oklch(0.45 0.135 60);
    --pill-nocalc-bg:oklch(0.93 0.045 245);
    --pill-nocalc-text:oklch(0.40 0.140 248);
    --pill-unit-bg:oklch(0.94 0.055 148);
    --pill-unit-text:oklch(0.42 0.125 148);

    --header-bg:oklch(0.985 0.005 65 / 0.85);
    --solution-bg:oklch(0.96 0.030 45);
    --details-bg:oklch(0.97 0.012 45);
    --table-head-bg:oklch(0.95 0.018 45);

    --score-bg:oklch(0.235 0.022 40);
    --score-text:oklch(0.985 0.005 65);
    --score-muted:oklch(0.65 0.022 40);

    --shadow-color:40 25% 30%;
    --shadow-near:0 1px 2px oklch(0.30 0.030 40 / 0.06), 0 2px 6px oklch(0.30 0.030 40 / 0.05);
    --shadow-mid:0 4px 14px oklch(0.30 0.030 40 / 0.08), 0 1px 3px oklch(0.30 0.030 40 / 0.05);
    --shadow-far:0 18px 40px oklch(0.30 0.080 40 / 0.14), 0 4px 12px oklch(0.30 0.030 40 / 0.06);
    --shadow:var(--shadow-mid);

    --radius-sm:8px;
    --radius:14px;
    --radius-lg:22px;
    --radius-xl:28px;

    --ease-out:cubic-bezier(0.22, 1, 0.36, 1);
    --ease-out-quart:cubic-bezier(0.25, 1, 0.5, 1);
    --ease-out-expo:cubic-bezier(0.16, 1, 0.3, 1);
  }
  [data-theme="dark"]{
    /* Dark theme тАФ kitchen lamp, 11pm, the night before the test */
    --bg:oklch(0.18 0.012 40);
    --paper:oklch(0.20 0.014 40);
    --card:oklch(0.235 0.018 42);
    --ink:oklch(0.96 0.008 65);
    --ink-soft:oklch(0.82 0.012 50);
    --muted:oklch(0.66 0.020 45);
    --line:oklch(0.32 0.020 45);
    --line-strong:oklch(0.42 0.025 45);

    --brand:oklch(0.74 0.155 44);
    --brand-deep:oklch(0.82 0.130 48);
    --brand-tint:oklch(0.30 0.060 40);
    --brand-tint-strong:oklch(0.38 0.090 40);
    --brand-ink:oklch(0.82 0.140 44);

    --ember:oklch(0.84 0.155 86);
    --ember-deep:oklch(0.92 0.140 90);
    --ember-tint:oklch(0.32 0.060 80);

    --good:oklch(0.74 0.150 148);
    --bad:oklch(0.72 0.155 24);
    --warn:oklch(0.82 0.140 84);

    --choice-bg:oklch(0.255 0.018 42);
    --choice-hover:oklch(0.30 0.022 45);
    --choice-selected:oklch(0.35 0.075 42);
    --feedback-good:oklch(0.30 0.060 148);
    --feedback-bad:oklch(0.32 0.075 22);

    --soft:oklch(0.30 0.045 42);
    --soft-text:var(--brand);

    --pill-calc-bg:oklch(0.32 0.065 70);
    --pill-calc-text:oklch(0.86 0.130 80);
    --pill-nocalc-bg:oklch(0.28 0.055 250);
    --pill-nocalc-text:oklch(0.82 0.115 248);
    --pill-unit-bg:oklch(0.28 0.055 148);
    --pill-unit-text:oklch(0.82 0.130 148);

    --header-bg:oklch(0.18 0.012 40 / 0.80);
    --solution-bg:oklch(0.26 0.030 42);
    --details-bg:oklch(0.235 0.015 42);
    --table-head-bg:oklch(0.27 0.020 42);

    --score-bg:oklch(0.30 0.040 42);
    --score-text:oklch(0.96 0.008 65);
    --score-muted:oklch(0.72 0.020 50);

    --shadow-near:0 1px 2px oklch(0 0 0 / 0.30), 0 2px 6px oklch(0 0 0 / 0.25);
    --shadow-mid:0 4px 14px oklch(0 0 0 / 0.40), 0 1px 3px oklch(0 0 0 / 0.30);
    --shadow-far:0 22px 50px oklch(0 0 0 / 0.55), 0 6px 16px oklch(0 0 0 / 0.35);
    --shadow:var(--shadow-mid);
  }
  [data-theme="dark"] mjx-container{color:var(--ink) !important}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:'Geist',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    font-feature-settings:"ss01","cv11";
    line-height:1.5;transition:background-color .25s var(--ease-out),color .25s var(--ease-out);
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  body{background-image:radial-gradient(ellipse 60% 40% at 80% -10%, oklch(from var(--brand) l c h / 0.07), transparent 60%),
    radial-gradient(ellipse 50% 30% at -10% 110%, oklch(from var(--ember) l c h / 0.05), transparent 65%);
    background-attachment:fixed}
  header{position:sticky;top:0;background:var(--header-bg);backdrop-filter:saturate(140%) blur(12px);-webkit-backdrop-filter:saturate(140%) blur(12px);border-bottom:1px solid var(--line);z-index:50;transition:background-color .25s var(--ease-out)}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}
  .topbar{display:flex;align-items:center;gap:18px;padding:14px 0;flex-wrap:wrap}
  .logo{font-weight:800;font-size:19px;letter-spacing:-.022em;display:inline-flex;align-items:center;gap:10px;color:var(--ink)}
  .logo .glyph{width:26px;height:26px;display:inline-grid;place-items:center;background:var(--brand);color:oklch(0.985 0.005 65);border-radius:7px;font-weight:800;font-size:15px;letter-spacing:-.04em;box-shadow:0 4px 10px oklch(from var(--brand) l c h / 0.35)}
  .logo span{color:var(--brand)}
  nav{display:flex;gap:2px;flex-wrap:wrap;margin-left:auto;align-items:center}
  nav button{background:transparent;border:1px solid transparent;color:var(--muted);
    padding:8px 13px;border-radius:9px;cursor:pointer;font-weight:500;font-size:14px;font-family:inherit;
    transition:background-color .15s var(--ease-out),color .15s var(--ease-out)}
  nav button:hover{background:var(--soft);color:var(--ink)}
  nav button.active{background:var(--ink);color:var(--paper);font-weight:600}
  [data-theme="dark"] nav button.active{background:var(--brand);color:oklch(0.18 0.012 40)}
  .topbar-tools{display:inline-flex;align-items:center;gap:10px;margin-left:6px;padding-left:12px;border-left:1px solid var(--line)}
  .streak-chip{display:none;align-items:center;gap:6px;padding:6px 10px;border-radius:99px;background:var(--ember-tint);color:var(--ember-deep);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;border:1px solid oklch(from var(--ember) l c h / 0.4)}
  .streak-chip.show{display:inline-flex}
  .streak-chip svg{width:14px;height:14px}
  .theme-toggle{background:var(--soft) !important;color:var(--ink) !important;
    border:1px solid var(--line) !important;padding:6px 10px !important;
    border-radius:9px;font-size:13px;cursor:pointer;display:inline-flex;
    align-items:center;gap:6px;line-height:1;font-family:inherit}
  .theme-toggle:hover{background:var(--choice-hover) !important}
  main{padding:48px 0 100px}
  @media (max-width: 540px){ main{padding:28px 0 80px} }
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:18px;box-shadow:var(--shadow-near)}
  h1{margin:0 0 8px;font-size:30px;letter-spacing:-.025em;font-weight:700;line-height:1.15}
  h2{margin:0 0 10px;font-size:22px;letter-spacing:-.018em;font-weight:700}
  h3{margin:18px 0 8px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  p{margin:0 0 12px}
  .muted{color:var(--muted);font-size:14px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;
    background:var(--soft);color:var(--soft-text)}
  .pill.calc{background:var(--pill-calc-bg);color:var(--pill-calc-text)}
  .pill.nocalc{background:var(--pill-nocalc-bg);color:var(--pill-nocalc-text)}
  .pill.unit{background:var(--pill-unit-bg);color:var(--pill-unit-text)}
  .btn{background:var(--brand);color:oklch(0.985 0.005 65);border:none;padding:10px 16px;border-radius:10px;
    cursor:pointer;font-weight:600;font-size:14px;font-family:inherit;letter-spacing:-.005em;
    transition:background-color .15s var(--ease-out),transform .15s var(--ease-out),box-shadow .2s var(--ease-out);
    box-shadow:0 1px 2px oklch(from var(--brand) calc(l - 0.20) c h / 0.30), 0 6px 14px oklch(from var(--brand) l c h / 0.25)}
  .btn:hover{background:var(--brand-deep);transform:translateY(-1px);box-shadow:0 2px 4px oklch(from var(--brand) calc(l - 0.20) c h / 0.30), 0 10px 22px oklch(from var(--brand) l c h / 0.30)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:transparent;color:var(--brand);border:1px solid var(--line-strong);box-shadow:none}
  .btn.ghost:hover{background:var(--brand-tint);border-color:var(--brand);color:var(--brand-deep);transform:translateY(-1px);box-shadow:none}
  .btn.muted{background:var(--soft);color:var(--ink);box-shadow:none}
  .btn.muted:hover{background:var(--choice-hover);transform:translateY(-1px);box-shadow:none}
  .btn.warn{background:var(--warn);color:oklch(0.20 0.030 60);box-shadow:0 1px 2px oklch(from var(--warn) calc(l - 0.30) c h / 0.30)}
  .btn.bad{background:var(--bad);color:oklch(0.985 0.005 65)}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
  select,input[type=text]{padding:8px 12px;border:1px solid var(--line-strong);border-radius:9px;
    font-size:14px;background:var(--card);color:var(--ink);font-family:inherit;
    transition:border-color .15s var(--ease-out),box-shadow .15s var(--ease-out)}
  select:focus,input[type=text]:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px oklch(from var(--brand) l c h / 0.18)}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:6px}
  .grid{display:grid;gap:14px}
  .grid.cols-2{grid-template-columns:1fr 1fr}
  .grid.cols-3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:720px){.grid.cols-2,.grid.cols-3{grid-template-columns:1fr}}
  .qbox{padding:18px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:14px}
  .qhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .qnum{font-weight:700;color:var(--muted);font-size:13px;letter-spacing:.04em;text-transform:uppercase}
  .qstem{font-size:16px;margin:8px 0 14px}
  .choice{display:block;padding:10px 14px;border:1px solid var(--line);border-radius:8px;
    margin-bottom:8px;cursor:pointer;background:var(--choice-bg);transition:all .12s ease;color:var(--ink)}
  .choice:hover{border-color:var(--brand);background:var(--choice-hover)}
  .choice.selected{border-color:var(--brand);background:var(--choice-selected)}
  .choice.correct{border-color:var(--good);background:var(--feedback-good)}
  .choice.wrong{border-color:var(--bad);background:var(--feedback-bad)}
  .choice .lab{font-weight:700;color:var(--brand);margin-right:8px}
  .choice.correct .lab{color:var(--good)}
  .choice.wrong .lab{color:var(--bad)}
  .feedback{margin-top:10px;padding:12px;border-radius:8px;font-size:14px}
  .feedback.right{background:var(--feedback-good);color:var(--good)}
  .feedback.wrong{background:var(--feedback-bad);color:var(--bad)}
  .feedback .why{color:var(--ink);margin-top:6px;font-size:14px}
  .timer{font-variant-numeric:tabular-nums;font-weight:700;font-size:18px;
    padding:8px 14px;background:var(--score-bg);color:var(--score-text);border-radius:8px}
  .timer.warn{background:var(--warn);color:#fff}
  .timer.danger{background:var(--bad);color:#fff}
  .progress{height:6px;background:var(--soft);border-radius:99px;overflow:hidden;margin:6px 0 14px}
  .progress > div{height:100%;background:var(--brand);transition:width .25s ease}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  details{border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:8px;background:var(--details-bg)}
  details[open]{background:var(--card)}
  summary{cursor:pointer;font-weight:600}
  .frq-part{padding:10px 14px;border-left:3px solid var(--brand);background:var(--solution-bg);border-radius:4px;margin-bottom:10px}
  .rubric li{margin-bottom:4px}
  .formula-table{width:100%;border-collapse:collapse;margin:8px 0}
  .formula-table th,.formula-table td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  .formula-table th{background:var(--table-head-bg);color:var(--muted);font-weight:600;text-transform:uppercase;font-size:12px;letter-spacing:.04em}
  .scorebox{display:flex;align-items:center;gap:18px;padding:18px;background:var(--score-bg);color:var(--score-text);border-radius:12px;margin-bottom:18px}
  .scorebox .big{font-size:42px;font-weight:700;letter-spacing:-.02em}
  .scorebox .muted{color:var(--score-muted) !important}
  .legend{font-size:13px;color:var(--muted);margin:8px 0 16px}
  .center{text-align:center}
  .hidden{display:none !important}
  .flag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700;
    background:var(--pill-calc-bg);color:var(--pill-calc-text);margin-left:6px}
  pre.solution{background:var(--solution-bg);padding:14px 16px;
    border-radius:10px;white-space:pre-wrap;font-family:inherit;font-size:14px;line-height:1.6;color:var(--ink);
    border:1px solid var(--line)}
  .check-row{display:flex;gap:8px;align-items:center;margin:6px 0}
  .check-row input{accent-color:var(--good);width:16px;height:16px}
  .badge{padding:2px 8px;border-radius:99px;background:var(--soft);color:var(--soft-text);font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}

  /* ============================================================
     HOME SCREEN
     Three regions: hero (today + Rho), mode quartet, footer.
     Each mode tile is a window into its mode, not an identical card.
     ============================================================ */
  .home{display:flex;flex-direction:column;gap:32px;padding-top:8px}

  /* ---- Hero (greeting + Rho + recommendation + CTA) ---- */
  .hero{position:relative;display:grid;grid-template-columns:1.45fr 1fr;gap:0;background:var(--card);
    border:1px solid var(--line);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-mid);
    isolation:isolate}
  .hero::before{content:"";position:absolute;inset:0;background:
    radial-gradient(ellipse 70% 90% at 100% 50%, oklch(from var(--brand) l c h / 0.10), transparent 60%),
    radial-gradient(ellipse 50% 70% at 0% 0%, oklch(from var(--ember) l c h / 0.08), transparent 60%);
    pointer-events:none;z-index:0}
  .hero-text{position:relative;z-index:1;padding:36px 36px 32px;display:flex;flex-direction:column;justify-content:center;gap:18px}
  .hero-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--muted);
    letter-spacing:.06em;text-transform:uppercase}
  .hero-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 4px oklch(from var(--brand) l c h / 0.15);
    animation:hero-pulse 2.4s var(--ease-out-expo) infinite}
  @keyframes hero-pulse{
    0%,100%{box-shadow:0 0 0 4px oklch(from var(--brand) l c h / 0.10)}
    50%{box-shadow:0 0 0 8px oklch(from var(--brand) l c h / 0.04)}
  }
  .hero-greeting{font-size:clamp(28px, 3.6vw, 40px);font-weight:700;line-height:1.05;letter-spacing:-.028em;margin:0;color:var(--ink)}
  .hero-greeting em{font-style:normal;color:var(--brand)}
  .hero-rec{font-size:16px;line-height:1.55;color:var(--ink-soft);max-width:46ch;margin:0}
  .hero-rec b{color:var(--ink);font-weight:600}
  .hero-cta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:4px}
  .hero-cta .btn{padding:13px 22px;font-size:15px;border-radius:11px}
  .hero-cta .btn-time{font-size:12px;font-weight:500;color:var(--muted);margin-left:4px}

  /* ---- Mascot panel ---- */
  .hero-mascot{position:relative;z-index:1;display:flex;align-items:flex-end;justify-content:center;
    background:linear-gradient(155deg, oklch(from var(--brand-tint) l c h / 0.5), transparent 70%);
    border-left:1px solid oklch(from var(--brand) l c h / 0.10);padding:24px 24px 0;min-height:240px}
  .rho{width:240px;height:240px;display:block;filter:drop-shadow(0 12px 24px oklch(from var(--brand-deep) l c h / 0.25));
    transform-origin:50% 100%}
  .rho > svg{display:block;width:100%;height:100%}
  .rho .rho-shadow{transition:opacity .4s var(--ease-out)}
  .rho .rho-eye{transform-origin:center;transform-box:fill-box;animation:rho-blink 5.5s var(--ease-out-expo) infinite}
  .rho .rho-eye-r{animation-delay:.05s}
  @keyframes rho-blink{
    0%,92%,100%{transform:scaleY(1)}
    94%,96%{transform:scaleY(0.1)}
  }
  .rho.rho-wave{animation:rho-wave 1100ms var(--ease-out-quart) 1}
  @keyframes rho-wave{
    0%{transform:translateY(20px) rotate(-6deg);opacity:0}
    20%{transform:translateY(0) rotate(-6deg);opacity:1}
    45%{transform:translateY(0) rotate(8deg)}
    70%{transform:translateY(0) rotate(-3deg)}
    100%{transform:translateY(0) rotate(0)}
  }
  .rho-sparkles{opacity:0;transition:opacity .4s var(--ease-out)}
  .rho.rho-streak .rho-sparkles{opacity:1;animation:rho-sparkle 2.6s var(--ease-out-expo) infinite}
  @keyframes rho-sparkle{
    0%,100%{transform:scale(.85);opacity:.7}
    50%{transform:scale(1.05);opacity:1}
  }
  .rho.rho-night .rho-mouth-default,
  .rho.rho-night .rho-eye{display:none}
  .rho.rho-night .rho-mouth-night,
  .rho.rho-night .rho-eye-closed{display:block}
  .rho .rho-mouth-night,.rho .rho-eye-closed{display:none}

  /* ---- Mode quartet тАФ 2x2, equal cells, distinct interiors ---- */
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .mode{position:relative;display:block;border:1px solid var(--line);background:var(--card);
    border-radius:var(--radius-lg);padding:24px;cursor:pointer;text-align:left;
    overflow:hidden;isolation:isolate;
    transition:transform .25s var(--ease-out-quart),box-shadow .25s var(--ease-out-quart),border-color .2s var(--ease-out)}
  .mode:hover{transform:translateY(-3px);border-color:var(--brand);box-shadow:var(--shadow-far)}
  .mode:focus-visible{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px oklch(from var(--brand) l c h / 0.25), var(--shadow-mid)}
  .mode-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
  .mode-title{font-size:19px;font-weight:700;letter-spacing:-.018em;color:var(--ink);margin:0}
  .mode-sub{font-size:13.5px;color:var(--muted);margin:2px 0 0;line-height:1.5;max-width:34ch}
  .mode-tag{font-size:11px;font-weight:600;color:var(--brand);background:var(--brand-tint);padding:4px 9px;border-radius:99px;
    letter-spacing:.02em;white-space:nowrap;text-transform:uppercase}
  .mode-tag.subtle{color:var(--muted);background:var(--soft)}
  .mode-canvas{position:relative;height:140px;margin-top:18px;display:flex;align-items:center;justify-content:center;
    border-radius:14px;overflow:hidden}

  /* Practice Exam tile тАФ clock arc */
  .mode-exam .mode-canvas{background:radial-gradient(circle at 50% 60%, oklch(from var(--brand) l c h / 0.06), transparent 70%)}
  .clock-face{position:relative;width:140px;height:140px}
  .clock-face svg{width:100%;height:100%;transform:rotate(-90deg)}
  .clock-track{stroke:var(--line);stroke-width:9;fill:none}
  .clock-fill{stroke:var(--brand);stroke-width:9;fill:none;stroke-linecap:round;
    transition:stroke-dashoffset 1.6s var(--ease-out-quart)}
  .clock-label{position:absolute;inset:0;display:grid;place-items:center;text-align:center;font-variant-numeric:tabular-nums}
  .clock-label .hours{font-size:24px;font-weight:700;color:var(--ink);letter-spacing:-.025em;line-height:1}
  .clock-label .mins{font-size:11px;color:var(--muted);font-weight:500;margin-top:3px;letter-spacing:.04em;text-transform:uppercase}

  /* Topic Practice tile тАФ unit chips */
  .mode-topic .mode-canvas{background:linear-gradient(135deg, oklch(from var(--brand) l c h / 0.04), transparent 70%);align-items:flex-start;padding:14px 4px}
  .unit-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;align-items:center;width:100%}
  .unit-chip{display:inline-grid;place-items:center;width:36px;height:36px;border-radius:10px;background:var(--card);
    border:1px solid var(--line);color:var(--ink-soft);font-weight:600;font-size:14px;font-variant-numeric:tabular-nums;
    transition:transform .25s var(--ease-out-quart),background .25s var(--ease-out)}
  .unit-chip.weak{background:var(--brand);color:oklch(0.985 0.005 65);border-color:var(--brand);
    box-shadow:0 4px 12px oklch(from var(--brand) l c h / 0.30);transform:translateY(-2px) scale(1.05)}
  .mode-topic:hover .unit-chip:not(.weak){transform:translateY(-1px)}
  .unit-chip-label{margin-top:8px;font-size:11px;color:var(--muted);text-align:center;width:100%;font-weight:500;letter-spacing:.04em;text-transform:uppercase}

  /* FRQ tile тАФ notebook fragment */
  .mode-frq .mode-canvas{background:repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent 22px,
    oklch(from var(--brand) l c h / 0.10) 22px,
    oklch(from var(--brand) l c h / 0.10) 23px
  );padding:14px 22px;align-items:flex-start;justify-content:flex-start}
  .frq-paper{font-family:'Geist Mono',ui-monospace,monospace;font-size:13.5px;color:var(--ink-soft);line-height:23px;width:100%}
  .frq-paper .frq-line{display:block}
  .frq-paper .frq-eq{color:var(--ink);font-weight:500}
  .frq-paper .frq-mark{color:var(--brand);font-weight:600}
  .frq-paper .frq-cursor{display:inline-block;width:7px;height:14px;background:var(--brand);vertical-align:-2px;
    margin-left:1px;animation:frq-blink 1s steps(1) infinite}
  @keyframes frq-blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}

  /* Study Guide tile тАФ flashcard cycle */
  .mode-guide .mode-canvas{background:linear-gradient(160deg, oklch(from var(--ember) l c h / 0.08), transparent 70%)}
  .flashcard-stack{position:relative;width:100%;height:100%;display:grid;place-items:center}
  .flashcard{grid-column:1;grid-row:1;width:78%;max-width:220px;padding:16px 18px;background:var(--card);
    border:1px solid var(--line);border-radius:13px;font-size:18px;color:var(--ink);text-align:center;
    box-shadow:var(--shadow-near);opacity:0;transform:translateY(8px) rotate(0);
    animation:flashcard-cycle 10s var(--ease-out-expo) infinite}
  .flashcard:nth-child(1){animation-delay:0s}
  .flashcard:nth-child(2){animation-delay:2.5s}
  .flashcard:nth-child(3){animation-delay:5s}
  .flashcard:nth-child(4){animation-delay:7.5s}
  @keyframes flashcard-cycle{
    0%{opacity:0;transform:translateY(12px) rotate(-1.5deg) scale(.95)}
    8%{opacity:1;transform:translateY(0) rotate(-1.5deg) scale(1)}
    25%{opacity:1;transform:translateY(0) rotate(-1.5deg) scale(1)}
    33%{opacity:0;transform:translateY(-12px) rotate(2deg) scale(.95)}
    100%{opacity:0;transform:translateY(12px) rotate(-1.5deg) scale(.95)}
  }

  /* ---- Footer ---- */
  .home-foot{font-size:13px;color:var(--muted);text-align:center;padding:8px 0;display:flex;gap:12px;
    align-items:center;justify-content:center;flex-wrap:wrap}
  .home-foot .dot-sep{opacity:.4}
  .home-foot b{color:var(--ink-soft);font-weight:600;font-variant-numeric:tabular-nums}

  /* ---- Streak indicator (header chip uses ember colors above) ---- */
  .ember-spark{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--ember);
    box-shadow:0 0 0 4px oklch(from var(--ember) l c h / 0.20),0 0 12px oklch(from var(--ember) l c h / 0.55);margin-right:6px;
    animation:ember-flicker 1.8s var(--ease-out-expo) infinite alternate}
  @keyframes ember-flicker{
    from{opacity:.85;transform:scale(.95)}
    to{opacity:1;transform:scale(1.1)}
  }

  /* ---- Responsive ---- */
  @media (max-width: 880px){
    .hero{grid-template-columns:1fr}
    .hero-text{padding:28px 24px 12px}
    .hero-mascot{border-left:none;border-top:1px solid oklch(from var(--brand) l c h / 0.10);min-height:200px;padding:16px 20px 0}
    .rho{width:180px;height:180px}
    .modes{grid-template-columns:1fr;gap:14px}
    .mode{padding:20px}
    .mode-canvas{height:120px}
    .home{gap:24px}
  }
  @media (max-width: 540px){
    .wrap{padding:0 16px}
    .topbar{gap:10px;padding:12px 0}
    nav{gap:0}
    nav button{padding:7px 10px;font-size:13px}
    .topbar-tools{padding-left:8px}
    .hero-greeting{font-size:26px}
    .mode-canvas{height:104px}
    .clock-face{width:108px;height:108px}
    .clock-label .hours{font-size:20px}
  }

  /* ---- Reduced motion ---- */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;
      transition-duration:.01ms !important}
    .rho.rho-wave{animation:none}
    .flashcard{opacity:1;transform:none;animation:none}
    .flashcard:nth-child(n+2){display:none}
    .hero-eyebrow .dot{box-shadow:0 0 0 4px oklch(from var(--brand) l c h / 0.10)}
    .ember-spark{animation:none;opacity:1}
  }
</style>
</head>
<body>

    <div class="logo" aria-label="AP Calc AB Prep"><span class="glyph" aria-hidden="true">тИл</span>AP Calc AB</div>

      <button data-mode="home" class="active">Home</button>

        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle dark mode"><span id="themeIcon">ЁЯМЩ</span><span id="themeLabel">Dark</span></button>
      </span>
    </nav>
  </div>
</header>
<main class="wrap" id="app"></main>

<script>
/* ============================================================
   AP Calculus AB Prep тАФ full single-file app
   Question banks (MCQ + FRQ + study guide) inline below.
   ============================================================ */

/* ---------- MCQ BANK ---------- */
/* Each item: { id, unit, topic, calc, q, choices, ans (index), exp }
   Math written in LaTeX (rendered with MathJax). */
const MCQ = [];

/* ---------- FRQ BANK ---------- */
const FRQ = [];

/* ---------- STUDY GUIDE ---------- */
const GUIDE = [];

/* ========== UNIT 1: LIMITS & CONTINUITY ========== */
MCQ.push(
  {id:'u1q1', unit:1, topic:'Limits & Continuity', calc:false,
    q:'Evaluate $\\displaystyle\\lim_{x\\to 2}\\frac{x^2-4}{x-2}$.',
    choices:['$0$','$2$','$4$','The limit does not exist'], ans:2,
    exp:'Factor: $\\frac{(x-2)(x+2)}{x-2}=x+2$ for $x\\ne 2$, so the limit is $2+2=4$.'},
  {id:'u1q2', unit:1, topic:'Limits & Continuity', calc:false,
    q:'Evaluate $\\displaystyle\\lim_{x\\to 0}\\frac{\\sin(3x)}{x}$.',
    choices:['$0$','$1$','$3$','DNE'], ans:2,
    exp:'$\\frac{\\sin(3x)}{x}=3\\cdot\\frac{\\sin(3x)}{3x}\\to 3\\cdot 1=3$.'},
  {id:'u1q3', unit:1, topic:'Limits & Continuity', calc:false,
    q:'Evaluate $\\displaystyle\\lim_{x\\to\\infty}\\frac{3x^2-2x+1}{5x^2+4}$.',
    choices:['$0$','$\\tfrac{3}{5}$','$\\tfrac{5}{3}$','$\\infty$'], ans:1,

  {id:'u1q4', unit:1, topic:'Limits & Continuity', calc:false,

  {id:'u1q5', unit:1, topic:'Continuity', calc:false,
    q:'For what value of $c$ is $f(x)=\\begin{cases}x^2+c,&x\\le 1\\\\3x-c,&x>1\\end{cases}$ continuous at $x=1$?',
    choices:['$-1$','$0$','$1$','$2$'], ans:2,
    exp:'Match left and right values: $1+c=3-c\\Rightarrow 2c=2\\Rightarrow c=1$.'},
  {id:'u1q6', unit:1, topic:'Limits', calc:false,
    q:'Evaluate $\\displaystyle\\lim_{x\\to 1}\\frac{x^3-1}{x-1}$.',

  {id:'u1q9', unit:1, topic:'Discontinuities', calc:false,
    q:'The function $f(x)=\\dfrac{x^2-9}{x-3}$ has which type of discontinuity at $x=3$?',
    choices:['Continuous (no discontinuity)','Jump','Removable','Infinite (vertical asymptote)'], ans:2,
    exp:'$f$ simplifies to $x+3$ for $x\\ne 3$. The graph has a hole тАФ a removable discontinuity.'},
  {id:'u1q10', unit:1, topic:'IVT', calc:false,
    q:'By the Intermediate Value Theorem, on which interval must $f(x)=x^3-4x+1$ have a real zero?',
    choices:['$[-2,-1]$','$[0,1]$','$[2,3]$','$[3,4]$'], ans:1,
    exp:'$f(0)=1>0$, $f(1)=-2<0$. Sign change on $[0,1]$ guarantees a zero by IVT.'},
  {id:'u1q11', unit:1, topic:'Special trig limit', calc:false,
    q:'Evaluate $\\displaystyle\\lim_{x\\to 0}\\frac{1-\\cos x}{x^2}$.',
    choices:['$0$','$\\tfrac{1}{2}$','$1$','DNE'], ans:1,
    exp:'Standard limit: $\\dfrac{1-\\cos x}{x^2}\\to\\dfrac{1}{2}$.'},
  {id:'u1q12', unit:1, topic:'Infinite limits', calc:false,
    q:'Evaluate $\\displaystyle\\lim_{x\\to 4^-}\\frac{1}{x-4}$.',
    choices:['$\\infty$','$-\\infty$','$0$','$1$'], ans:1,
    exp:'For $x$ slightly less than $4$, $x-4$ is small and negative, so the reciprocal $\\to-\\infty$.'},
  {id:'u1q13', unit:1, topic:'Asymptotes', calc:false,
    q:'For $f(x)=\\dfrac{x-1}{x^2-1}$, identify all vertical asymptotes.',
    choices:['$x=1$ only','$x=-1$ only','$x=\\pm 1$','None'], ans:1,
    exp:'$f=\\dfrac{x-1}{(x-1)(x+1)}=\\dfrac{1}{x+1}$ for $x\\ne 1$. VA only at $x=-1$; $x=1$ is a hole.'}

/* ========== UNIT 2: DIFFERENTIATION тАФ DEFINITION & FUND. PROPERTIES ========== */
MCQ.push(
  {id:'u2q1', unit:2, topic:'Power rule', calc:false,
    q:'If $f(x)=3x^4-2x^2+5x-7$, find $f\'(x)$.',
    choices:['$12x^3-4x+5$','$12x^3-2x+5$','$3x^3-4x+5$','$12x^3-4x$'], ans:0,
    exp:'Power rule term-by-term: $f\'(x)=12x^3-4x+5$.'},
  {id:'u2q2', unit:2, topic:'Product rule', calc:false,
    q:'If $f(x)=e^x\\sin x$, find $f\'(x)$.',

  {id:'u2q3', unit:2, topic:'Power rule', calc:false,
    q:'$\\dfrac{d}{dx}\\left[x^{-3}\\right]=$',

  {id:'u2q4', unit:2, topic:'Reciprocal', calc:false,
    q:'$\\dfrac{d}{dx}\\left[\\dfrac{1}{x}\\right]=$',
    choices:['$\\ln x$','$-\\dfrac{1}{x^2}$','$\\dfrac{1}{x^2}$','$1$'], ans:1,
    exp:'$\\frac{1}{x}=x^{-1}$; derivative is $-x^{-2}=-1/x^2$.'},
  {id:'u2q5', unit:2, topic:'Square root', calc:false,
    q:'If $f(x)=\\sqrt{x}$, find $f\'(4)$.',
    choices:['$\\tfrac{1}{2}$','$\\tfrac{1}{4}$','$2$','$1$'], ans:1,
    exp:'$f\'(x)=\\dfrac{1}{2\\sqrt{x}}$; at $x=4$: $\\dfrac{1}{4}$.'},
  {id:'u2q6', unit:2, topic:'Derivative as a limit', calc:false,
    q:'$\\displaystyle\\lim_{h\\to 0}\\dfrac{\\ln(2+h)-\\ln 2}{h}=$',
    choices:['$\\ln 2$','$\\tfrac{1}{2}$','$2$','$0$'], ans:1,
    exp:'This is the derivative of $\\ln x$ at $x=2$. Since $(\\ln x)\'=\\frac{1}{x}$, the answer is $\\frac{1}{2}$.'},
  {id:'u2q7', unit:2, topic:'Tangent line', calc:false,
    q:'Find the equation of the tangent line to $y=x^3+2x$ at $x=1$.',
    choices:['$y=3x$','$y=5x-2$','$y=5x+2$','$y=3x+2$'], ans:1,
    exp:'$y(1)=3$, $y\'=3x^2+2$, $y\'(1)=5$. Line: $y-3=5(x-1)\\Rightarrow y=5x-2$.'},
  {id:'u2q8', unit:2, topic:'Quotient rule', calc:false,
    q:'$\\dfrac{d}{dx}\\left[\\dfrac{x}{x+1}\\right]=$',
    choices:['$\\dfrac{1}{(x+1)^2}$','$\\dfrac{1}{x+1}$','$\\dfrac{x}{(x+1)^2}$','$\\dfrac{x-1}{(x+1)^2}$'], ans:0,
    exp:'$\\dfrac{(1)(x+1)-x(1)}{(x+1)^2}=\\dfrac{1}{(x+1)^2}$.'},
  {id:'u2q9', unit:2, topic:'Derivatives of standard fns', calc:false,
    q:'$\\dfrac{d}{dx}[\\ln x]=$',
    choices:['$\\dfrac{1}{x}$','$\\dfrac{1}{\\ln x}$','$x\\ln x$','$\\ln x$'], ans:0,
    exp:'Standard derivative: $\\dfrac{d}{dx}\\ln x=\\dfrac{1}{x}$.'},
  {id:'u2q10', unit:2, topic:'Derivatives of trig', calc:false,
    q:'$\\dfrac{d}{dx}[\\tan x]=$',
    choices:['$\\sec x\\tan x$','$-\\csc^2 x$','$\\sec^2 x$','$-\\sin^2 x$'], ans:2,
    exp:'$\\frac{d}{dx}\\tan x=\\sec^2 x$.'},
  {id:'u2q11', unit:2, topic:'Exponential', calc:false,
    q:'$\\dfrac{d}{dx}[e^{2x}]=$',
    choices:['$e^{2x}$','$2e^x$','$2xe^{2x-1}$','$2e^{2x}$'], ans:3,
    exp:'Chain rule: $\\dfrac{d}{dx}[e^{2x}]=2e^{2x}$.'},
  {id:'u2q12', unit:2, topic:'Position/velocity', calc:false,
    q:'A particle moves with $s(t)=t^3-6t^2+9t$. Find the velocity at $t=2$.',

  {id:'u2q13', unit:2, topic:'Tangent slope', calc:false,
    q:'What is the slope of the tangent to $y=x^2+3x$ at $x=2$?',
    choices:['$5$','$7$','$10$','$12$'], ans:1,
    exp:'$y\'=2x+3$; at $x=2$, slope $=7$.'}

/* ========== UNIT 3: COMPOSITE / IMPLICIT / INVERSE ========== */
MCQ.push(
  {id:'u3q1', unit:3, topic:'Chain rule', calc:false,
    q:'$\\dfrac{d}{dx}\\left[(3x+1)^5\\right]=$',
    choices:['$5(3x+1)^4$','$15(3x+1)^4$','$3(3x+1)^4$','$5(3x+1)^4\\cdot x$'], ans:1,
    exp:'Chain rule: $5(3x+1)^4\\cdot 3=15(3x+1)^4$.'},
  {id:'u3q2', unit:3, topic:'Chain rule', calc:false,
    q:'$\\dfrac{d}{dx}[\\sin(x^2)]=$',

  {id:'u3q3', unit:3, topic:'Chain with ln', calc:false,
    q:'$\\dfrac{d}{dx}[\\ln(x^2+1)]=$',
    choices:['$\\dfrac{1}{x^2+1}$','$\\dfrac{2x}{x^2+1}$','$\\dfrac{2x}{(x^2+1)^2}$','$\\dfrac{1}{2x}$'], ans:1,

  {id:'u3q6', unit:3, topic:'Implicit', calc:false,

  {id:'u3q7', unit:3, topic:'Inverse trig', calc:false,
    q:'$\\dfrac{d}{dx}[\\arcsin x]=$',

  {id:'u3q8', unit:3, topic:'Inverse trig with chain', calc:false,

    exp:'$\\dfrac{1}{1+(2x)^2}\\cdot 2=\\dfrac{2}{1+4x^2}$.'},
  {id:'u3q9', unit:3, topic:'Derivative of inverse', calc:false,
    q:'If $f(x)=x^3+x$ and $g$ is the inverse of $f$, find $g\'(2)$.',
    choices:['$\\tfrac{1}{2}$','$\\tfrac{1}{4}$','$4$','$\\tfrac{1}{10}$'], ans:1,
    exp:'$f(1)=2$. $f\'(x)=3x^2+1$, so $f\'(1)=4$. $g\'(2)=1/f\'(1)=1/4$.'},
  {id:'u3q10', unit:3, topic:'Trig chain', calc:false,
    q:'$\\dfrac{d}{dx}[\\sec(3x)]=$',
    choices:['$\\sec(3x)\\tan(3x)$','$3\\sec(3x)\\tan(3x)$','$3\\tan(3x)$','$\\sec^2(3x)$'], ans:1,
    exp:'$\\sec u$ with $u=3x$: derivative $\\sec u\\tan u\\cdot u\'=3\\sec(3x)\\tan(3x)$.'},
  {id:'u3q11', unit:3, topic:'Power-of-a-function', calc:false,
    q:'$\\dfrac{d}{dx}[\\cos^3 x]=$',
    choices:['$3\\cos^2 x$','$-3\\cos^2 x\\sin x$','$-\\sin^3 x$','$3\\cos^2 x\\sin x$'], ans:1,

FRQ.push({
  id:'frq1', title:'Water tank: rate in / rate out', calc:true, unit:'8 (Apps of Integration)',
  context:'At time $t$ hours, $0\\le t\\le 12$, water flows into a tank at rate $R(t)=20+5\\cos\\!\\left(\\dfrac{\\pi t}{6}\\right)$ gallons per hour and leaves at rate $D(t)=\\dfrac{t^2}{4}+2$ gallons per hour. The tank contains $100$ gallons at $t=0$.',
  parts:[
    {label:'(a)', q:'How much water flows into the tank during the $12$-hour period? Round to the nearest tenth of a gallon.', points:2,
      rubric:['Sets up integral $\\int_0^{12} R(t)\\,dt$ тАФ 1 pt','Correct value $240.0$ gal тАФ 1 pt'],
      solution:'$\\displaystyle\\int_0^{12}\\!\\left(20+5\\cos\\!\\tfrac{\\pi t}{6}\\right)dt=\\bigg[20t+\\tfrac{30}{\\pi}\\sin\\!\\tfrac{\\pi t}{6}\\bigg]_0^{12}=240$ gallons.'},
    {label:'(b)', q:'Is the amount of water in the tank increasing or decreasing at $t=4$? Justify.', points:2,
      rubric:['Computes $R(4)$ and $D(4)$ тАФ 1 pt','Concludes "increasing" with $R(4)-D(4)>0$ тАФ 1 pt'],
      solution:'$R(4)=20+5\\cos\\!\\tfrac{2\\pi}{3}=20-2.5=17.5$. $D(4)=\\tfrac{16}{4}+2=6$. Net rate $=11.5>0$ $\\Rightarrow$ increasing.'},
    {label:'(c)', q:'At what time $t$ in $[0,12]$ is the amount of water in the tank greatest? Justify your answer.', points:3,
      rubric:['Sets net rate $R(t)-D(t)=0$ тАФ 1 pt','Numerical solution $t\\approx 7.717$ тАФ 1 pt','Justification (sign change of net rate from $+$ to $-$) тАФ 1 pt'],
      solution:'Maximum occurs where the net rate changes from positive to negative. Solving $R(t)=D(t)$ numerically on $[0,12]$ gives $t\\approx 7.717$. For $t<7.717$ net rate is positive (water increasing); for $t>7.717$ negative; so the absolute max in $[0,12]$ occurs at $t\\approx 7.717$.'},
    {label:'(d)', q:'Find the maximum amount of water in the tank, in gallons. Round to the nearest tenth.', points:2,
      rubric:['Sets up $W(t_{max})=100+\\int_0^{t_{max}}\\!(R-D)\\,dt$ тАФ 1 pt','Numerical value $\\approx 193.1$ gal тАФ 1 pt'],
      solution:'$W(7.717)=100+\\displaystyle\\int_0^{7.717}\\!(R(s)-D(s))\\,ds\\approx 100+93.1=193.1$ gallons.'}
  ]
});

FRQ.push({
  id:'frq2', title:'Particle motion (calculator)', calc:true, unit:'4/8',
  context:'A particle moves along the $x$-axis. Its velocity at time $t$ ($t\\ge 0$) seconds is $v(t)=t^2-6t+8$ m/s. The particle\'s position at $t=0$ is $x(0)=2$ m.',
  parts:[
    {label:'(a)', q:'Find all times $t$ in $[0,5]$ when the particle changes direction. Justify.', points:2,
      rubric:['Solves $v(t)=0$: $t=2,4$ тАФ 1 pt','Verifies sign change of $v$ at each тАФ 1 pt'],
      solution:'$v=(t-2)(t-4)=0\\Rightarrow t=2,\\,4$. $v$ changes from $+$ to $-$ at $t=2$ and from $-$ to $+$ at $t=4$, so direction changes at both.'},
    {label:'(b)', q:'Find the position of the particle at $t=5$.', points:2,
      rubric:['Sets up $x(5)=x(0)+\\int_0^5 v(t)\\,dt$ тАФ 1 pt','Correct value $\\tfrac{26}{3}$ m $\\approx 8.667$ тАФ 1 pt'],
      solution:'$\\displaystyle\\int_0^5(t^2-6t+8)\\,dt=\\Big[\\tfrac{t^3}{3}-3t^2+8t\\Big]_0^5=\\tfrac{125}{3}-75+40=\\tfrac{20}{3}$. So $x(5)=2+\\tfrac{20}{3}=\\tfrac{26}{3}\\approx 8.667$ m.'},
    {label:'(c)', q:'Find the total distance traveled by the particle on $[0,5]$.', points:3,
      rubric:['Recognizes total distance $=\\int_0^5|v|\\,dt$ тАФ 1 pt','Splits at $t=2,\\,4$ тАФ 1 pt','Correct value $=\\tfrac{28}{3}\\approx 9.333$ m тАФ 1 pt'],
      solution:'On $[0,2]$, $v\\ge 0$: $\\int_0^2 v\\,dt=\\tfrac{20}{3}$.\nOn $[2,4]$, $v\\le 0$: $\\big|\\int_2^4 v\\,dt\\big|=\\tfrac{4}{3}$.\nOn $[4,5]$, $v\\ge 0$: $\\int_4^5 v\\,dt=\\tfrac{4}{3}$.\nTotal distance $=\\tfrac{20}{3}+\\tfrac{4}{3}+\\tfrac{4}{3}=\\tfrac{28}{3}\\approx 9.333$ m.'},
    {label:'(d)', q:'At $t=3$, is the particle\'s speed increasing or decreasing? Justify.', points:2,
      rubric:['Computes $v(3)=-1$ and $a(3)=2t-6\\big|_{t=3}=0$. тАФ 1 pt','Concludes neither (speed has zero rate) тАФ 1 pt OR observes $a$ changes sign and analyzes nearby values'],
      solution:'$v(3)=9-18+8=-1<0$. $a(3)=2(3)-6=0$. Since acceleration is zero at $t=3$, neither increasing nor decreasing instantaneously. (At $t=3^-$, $a<0$ and $v<0$ so speed is increasing; at $t=3^+$, $a>0$ and $v<0$ so speed is decreasing тАФ $t=3$ is a local maximum of speed.)'}
  ]
});

FRQ.push({

  context:'Selected values of a differentiable function $f(x)$ are given.\n$\\begin{array}{c|ccccc}x&0&2&5&7&10\\\\\\hline f(x)&3&5&8&12&15\\end{array}$',

FRQ.push({
  id:'frq4', title:'Implicit differentiation', calc:false, unit:'3',
  context:'Consider the curve given by $x^2+xy+y^2=7$.',
  parts:[
    {label:'(a)', q:'Find $\\dfrac{dy}{dx}$ in terms of $x$ and $y$.', points:3,
      rubric:['Differentiates implicitly тАФ 1 pt','Treats $xy$ with product rule тАФ 1 pt','Solves for $\\dfrac{dy}{dx}=-\\dfrac{2x+y}{x+2y}$ тАФ 1 pt'],
      solution:'$2x+y+xy\'+2yy\'=0\\Rightarrow y\'(x+2y)=-(2x+y)\\Rightarrow\\dfrac{dy}{dx}=-\\dfrac{2x+y}{x+2y}$.'},
    {label:'(b)', q:'Find an equation of the line tangent to the curve at the point $(1,2)$.', points:2,
      rubric:['Substitutes $(1,2)$ into derivative: slope $=-\\tfrac{4}{5}$ тАФ 1 pt','Writes $y-2=-\\tfrac{4}{5}(x-1)$ тАФ 1 pt'],
      solution:'At $(1,2)$: slope $=-\\dfrac{2(1)+2}{1+2(2)}=-\\dfrac{4}{5}$. Tangent line: $y-2=-\\dfrac{4}{5}(x-1)$.'},
    {label:'(c)', q:'Find all points on the curve at which the tangent line is horizontal.', points:2,
      rubric:['Sets $2x+y=0$ тАФ 1 pt','Substitutes back to get $x^2-2x^2+4x^2=7\\Rightarrow x^2=\\tfrac{7}{3}$ and lists the two points тАФ 1 pt'],
      solution:'Horizontal tangent $\\Leftrightarrow 2x+y=0\\Rightarrow y=-2x$. Substitute: $x^2+x(-2x)+4x^2=3x^2=7\\Rightarrow x=\\pm\\sqrt{7/3}$. Points: $\\big(\\sqrt{7/3},\\,-2\\sqrt{7/3}\\big)$ and $\\big(-\\sqrt{7/3},\\,2\\sqrt{7/3}\\big)$.'},
    {label:'(d)', q:'Show that the curve has no points where the tangent line is vertical, except possibly where the derivative formula fails.', points:2,
      rubric:['Sets denominator $x+2y=0\\Rightarrow x=-2y$ тАФ 1 pt','Substitutes and finds $4y^2-2y^2+y^2=3y^2=7$, gives $\\pm$ points; checks numerator: at those points $2x+y=-4y+y=-3y\\ne 0$ when $y\\ne 0$, so vertical tangent at $(\\mp 2\\sqrt{7/3},\\pm\\sqrt{7/3})$ тАФ 1 pt'],
      solution:'$x+2y=0\\Rightarrow x=-2y$. Substituting: $4y^2-2y^2+y^2=3y^2=7\\Rightarrow y=\\pm\\sqrt{7/3}$, $x=\\mp 2\\sqrt{7/3}$. At these points the numerator $2x+y=-3y\\ne 0$, so the tangent is vertical there. (The curve does have vertical tangents тАФ at those two points.)'}
  ]
});

FRQ.push({
  id:'frq5', title:'Differential equation and slope field', calc:false, unit:'7',
  context:'Consider the differential equation $\\dfrac{dy}{dx}=\\dfrac{x}{y}$ with $y>0$.',
  parts:[
    {label:'(a)', q:'On the slope field for this differential equation, sketch the solution curve passing through the point $(0,2)$. (Describe its shape.)', points:1,
      rubric:['Describes that solution is the upper half of a hyperbola through $(0,2)$ opening with $y$ increasing as $|x|$ increases тАФ 1 pt'],
      solution:'The slope at $(0,2)$ is $0$ (horizontal tangent), and slopes grow with $|x|/y$, so the solution curve looks like the upper branch of a hyperbola, passing through $(0,2)$ and increasing as $|x|$ increases.'},
    {label:'(b)', q:'Find the particular solution $y=f(x)$ to the differential equation with initial condition $f(0)=2$.', points:3,
      rubric:['Separates variables тАФ 1 pt','Antidifferentiates correctly: $y^2/2=x^2/2+C$ тАФ 1 pt','Applies initial condition and solves for $y$: $y=\\sqrt{x^2+4}$ тАФ 1 pt'],
      solution:'$y\\,dy=x\\,dx\\Rightarrow\\tfrac{y^2}{2}=\\tfrac{x^2}{2}+C$. With $f(0)=2$: $C=2$, so $y^2=x^2+4$, and since $y>0$, $y=\\sqrt{x^2+4}$.'},
    {label:'(c)', q:'For the solution in (b), find $\\dfrac{d^2y}{dx^2}$ at $x=0$ and explain what it tells you about the curve.', points:3,
      rubric:['Implicit second derivative or direct: $y\'=x/y$ so $y\'\'=(y-xy\')/y^2$ тАФ 1 pt','At $(0,2)$: $y\'\'=1/2$ тАФ 1 pt','Concludes curve is concave up at $(0,2)$ тАФ 1 pt'],
      solution:'Differentiating $y\'=x/y$: $y\'\'=\\dfrac{y-xy\'}{y^2}=\\dfrac{1}{y}-\\dfrac{x\\cdot(x/y)}{y^2}=\\dfrac{1}{y}-\\dfrac{x^2}{y^3}$. At $(0,2)$: $y\'\'=1/2>0$. The curve is concave up at $(0,2)$.'},
    {label:'(d)', q:'Does the solution from (b) have a horizontal tangent? Explain.', points:1,
      rubric:['Argues $y\'=x/y=0\\Leftrightarrow x=0$, so unique horizontal tangent at $(0,2)$ тАФ 1 pt'],
      solution:'$y\'=x/y=0\\Leftrightarrow x=0$. The solution has exactly one horizontal tangent, at the initial point $(0,2)$.'}
  ]
});

FRQ.push({
  id:'frq6', title:'Analysis from the graph of f\'', calc:false, unit:'5',
  context:'Let $f$ be a differentiable function defined on $[-3,5]$. The graph of its derivative $f\'$ on this interval is given (described): $f\'$ is positive on $(-3,-1)$, negative on $(-1,3)$, and positive on $(3,5)$. Also $f\'(-1)=f\'(3)=0$, and $f\'$ has a local minimum at $x=1$.',
  parts:[
    {label:'(a)', q:'On what intervals is $f$ increasing? Justify.', points:2,
      rubric:['Identifies $(-3,-1)\\cup(3,5)$ тАФ 1 pt','Justifies via $f\'>0$ тАФ 1 pt'],
      solution:'$f$ is increasing where $f\'>0$, i.e. on $(-3,-1)$ and on $(3,5)$.'},
    {label:'(b)', q:'Find all $x$-values where $f$ has a local maximum or minimum, and classify each. Justify.', points:2,
      rubric:['Identifies local max at $x=-1$ ($f\'$ changes $+\\to-$) тАФ 1 pt','Identifies local min at $x=3$ ($f\'$ changes $-\\to+$) тАФ 1 pt'],
      solution:'$f\'(-1)=0$ and $f\'$ changes from $+$ to $-$ $\\Rightarrow$ local max at $x=-1$. $f\'(3)=0$ and $f\'$ changes from $-$ to $+$ $\\Rightarrow$ local min at $x=3$.'},
    {label:'(c)', q:'On what intervals is $f$ concave up?', points:2,
      rubric:['Identifies that $f\'$ is increasing on $(1,5)$ тАФ 1 pt','States $f$ concave up on $(1,5)$ тАФ 1 pt'],
      solution:'$f$ is concave up where $f\'\'>0$, i.e. where $f\'$ is increasing. Given $f\'$ has its local min at $x=1$, $f\'$ is increasing on $(1,5)$, so $f$ is concave up on $(1,5)$.'},
    {label:'(d)', q:'If $f(-3)=2$, must $f(5)>2$? Justify in terms of areas.', points:3,
      rubric:['Recognizes $f(5)=f(-3)+\\int_{-3}^5 f\'(x)\\,dx$ тАФ 1 pt','Compares positive and negative areas тАФ 1 pt','Reasoning that whether $f(5)>2$ depends on whether positive areas exceed negative тАФ 1 pt'],
      solution:'$f(5)=f(-3)+\\int_{-3}^5 f\'(x)\\,dx=2+\\big[(\\text{area where }f\'>0)-(\\text{area where }f\'<0)\\big]$. So $f(5)>2$ iff the total positive area of $f\'$ on $(-3,-1)\\cup(3,5)$ exceeds the negative area on $(-1,3)$. Without numerical area data, the conclusion cannot be determined; it is not automatic.'}
  ]
});

FRQ.push({
  id:'frq7', title:'Volumes (calculator)', calc:true, unit:'8',
  context:'Let $R$ be the region in the first quadrant enclosed by $y=\\sqrt{x}$, $y=x/2$, and the $y$-axis.',
  parts:[
    {label:'(a)', q:'Find the area of $R$.', points:2,
      rubric:['Finds intersection points $x=0,4$ тАФ 1 pt','Computes $\\int_0^4(\\sqrt x-x/2)\\,dx=\\tfrac{4}{3}$ тАФ 1 pt'],
      solution:'$\\sqrt{x}=x/2\\Rightarrow x=0,4$. Area $=\\int_0^4(\\sqrt{x}-x/2)\\,dx=\\big[\\tfrac{2}{3}x^{3/2}-\\tfrac{x^2}{4}\\big]_0^4=\\tfrac{16}{3}-4=\\tfrac{4}{3}$.'},
    {label:'(b)', q:'The region $R$ is the base of a solid. Cross-sections perpendicular to the $x$-axis are squares. Find the volume.', points:3,
      rubric:['Side length $=\\sqrt{x}-x/2$ тАФ 1 pt','Sets up $V=\\int_0^4(\\sqrt{x}-x/2)^2\\,dx$ тАФ 1 pt','Evaluates: $V=\\tfrac{8}{15}$ тАФ 1 pt'],
      solution:'$V=\\displaystyle\\int_0^4 (\\sqrt{x}-x/2)^2\\,dx=\\int_0^4(x-x^{3/2}+x^2/4)\\,dx=\\big[\\tfrac{x^2}{2}-\\tfrac{2}{5}x^{5/2}+\\tfrac{x^3}{12}\\big]_0^4=8-\\tfrac{64}{5}+\\tfrac{16}{3}=\\tfrac{120-192+80}{15}=\\tfrac{8}{15}$.'},
    {label:'(c)', q:'Find the volume of the solid generated by rotating $R$ about the $x$-axis.', points:2,
      rubric:['Sets up washer integral $V=\\pi\\int_0^4\\big(x-x^2/4\\big)\\,dx$ тАФ 1 pt','Evaluates: $V=\\tfrac{8\\pi}{3}$ тАФ 1 pt'],
      solution:'$V=\\pi\\int_0^4\\big[(\\sqrt x)^2-(x/2)^2\\big]dx=\\pi\\int_0^4\\big(x-\\tfrac{x^2}{4}\\big)dx=\\pi\\Big[\\tfrac{x^2}{2}-\\tfrac{x^3}{12}\\Big]_0^4=\\pi\\big(8-\\tfrac{16}{3}\\big)=\\dfrac{8\\pi}{3}$.'},
    {label:'(d)', q:'Find the volume of the solid generated by rotating $R$ about the line $y=4$.', points:2,
      rubric:['Sets up washer with outer radius $4-x/2$ and inner radius $4-\\sqrt x$ тАФ 1 pt','Evaluates: $V=8\\pi\\approx 25.133$ тАФ 1 pt'],
      solution:'$V=\\pi\\displaystyle\\int_0^4\\!\\big[(4-x/2)^2-(4-\\sqrt x)^2\\big]\\,dx=\\pi\\int_0^4\\!\\big[(16-4x+x^2/4)-(16-8\\sqrt{x}+x)\\big]dx=\\pi\\int_0^4\\!(-5x+x^2/4+8\\sqrt x)dx=\\pi\\big[-\\tfrac{5x^2}{2}+\\tfrac{x^3}{12}+\\tfrac{16}{3}x^{3/2}\\big]_0^4=\\pi\\big[-40+\\tfrac{64}{12}+\\tfrac{128}{3}\\big]=\\pi\\big[-40+\\tfrac{16}{3}+\\tfrac{128}{3}\\big]=\\pi\\big[-40+48\\big]=8\\pi\\approx 25.133$.'}
  ]
});

/* ---------- STATE (localStorage) ---------- */
/* Tracks streak, XP, and last-known progress so the home screen can recommend
   what to work on next. All keys live under a single namespaced object so a
   schema change is one read + one write. */
const APState = (() => {
  const KEY = 'apcalc-state-v1';
  const todayISO = () => new Date().toISOString().slice(0,10);
  const daysBetween = (aISO, bISO) => {
    if(!aISO || !bISO) return null;
    const a = new Date(aISO+'T00:00:00');
    const b = new Date(bISO+'T00:00:00');
    return Math.round((b - a) / 86400000);
  };
  const fresh = () => ({
    lastSessionDate: null,
    streakDays: 0,
    longestStreak: 0,
    totalXP: 0,
    totalAnswered: 0,
    totalCorrect: 0,
    lastModeAttempted: null,
    weakestUnit: null,
    perUnit: {}, // { '3': { seen: 12, correct: 7 } }
  });
  let cache = null;
  const read = () => {
    if(cache) return cache;
    try { const raw = localStorage.getItem(KEY); cache = raw ? Object.assign(fresh(), JSON.parse(raw)) : fresh(); }
    catch(e){ cache = fresh(); }
    return cache;
  };
  const write = (s) => {
    cache = s;
    try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e){}
  };
  const tickStreak = () => {
    const s = read();
    const today = todayISO();
    if(s.lastSessionDate === today) return s;
    const gap = daysBetween(s.lastSessionDate, today);
    if(gap === 1) s.streakDays += 1;
    else if(gap === null || gap > 1) s.streakDays = 1;
    s.lastSessionDate = today;
    s.longestStreak = Math.max(s.longestStreak, s.streakDays);
    write(s);
    return s;
  };
  const wasStreakBroken = () => {
    const s = read();
    if(!s.lastSessionDate) return false;
    const gap = daysBetween(s.lastSessionDate, todayISO());
    return gap !== null && gap > 1 && s.longestStreak >= 2;
  };
  const recordAnswer = (unit, isCorrect) => {
    const s = read();
    s.totalAnswered += 1;
    if(isCorrect){ s.totalCorrect += 1; s.totalXP += 10; }
    if(unit != null){
      const key = String(unit);
      s.perUnit[key] = s.perUnit[key] || { seen:0, correct:0 };
      s.perUnit[key].seen += 1;
      if(isCorrect) s.perUnit[key].correct += 1;
    }
    s.weakestUnit = computeWeakest(s.perUnit);
    write(s);
    return s;
  };
  const noteMode = (mode) => {
    const s = read();
    s.lastModeAttempted = mode;
    write(s);
  };
  const computeWeakest = (perUnit) => {
    let worst = null, worstAcc = 1;
    for(const [u, v] of Object.entries(perUnit)){
      if(v.seen < 3) continue; // need a minimum sample
      const acc = v.correct / v.seen;
      if(acc < worstAcc){ worstAcc = acc; worst = Number(u); }
    }
    return worst;
  };
  const reset = () => write(fresh());
  return { read, tickStreak, wasStreakBroken, recordAnswer, noteMode, reset };
})();

function applyTheme(theme){
  // Set on <html> so the CSS variables also reach the html element itself.
  // Otherwise html keeps :root's light values and any uncovered area
  // (when content is shorter than the viewport) shows as a white band.
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if(icon && label){
    if(theme === 'dark'){ icon.textContent = 'тШАя╕П'; label.textContent = 'Light'; }
    else { icon.textContent = 'ЁЯМЩ'; label.textContent = 'Dark'; }
  }
}
function initTheme(){
  let saved = null;
  try { saved = localStorage.getItem('apcalc-theme'); } catch(e){}
  if(!saved){
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    saved = prefersDark ? 'dark' : 'light';
  }
  applyTheme(saved);
}
document.getElementById('themeToggle').addEventListener('click', ()=>{
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  try { localStorage.setItem('apcalc-theme', next); } catch(e){}
});

refreshStreakChip();

function navigateTo(mode){
  navBtns.forEach(x => x.classList.toggle('active', x.dataset.mode===mode));

  if(mode !== 'home'){

}

function unitTitle(n){
  const map = {1:'Limits & Continuity',2:'Differentiation',3:'Composite & Implicit',4:'Apps of Differentiation',
    5:'Analytical Apps',6:'Integration',7:'Differential Equations',8:'Apps of Integration'};
  return map[n] || `Unit ${n}`;
}

function buildRecommendation(){
  const s = APState.read();
  const broken = APState.wasStreakBroken();
  // Choose what to recommend based on state.
  if(s.totalAnswered === 0){
    return { label:'Start a 5-question warm-up', body:`Pick any unit, take it slow. We'll start tracking your weak spots once you've answered a few.`, mode:'topic' };
  }
  if(s.weakestUnit != null){
    const u = s.perUnit[String(s.weakestUnit)];
    const pct = Math.round((u.correct/u.seen)*100);
    return { label:`Drill Unit ${s.weakestUnit}`, body:`Last time, ${pct}% on <b>${unitTitle(s.weakestUnit)}</b>. Ten more questions and you'll feel it click.`, mode:'topic', unit:s.weakestUnit };
  }
  if(broken){
    return { label:'Pick something quick', body:`A 5-question topic drill is the lowest-effort way back in. You don't have to commit to a whole exam.`, mode:'topic' };
  }
  if(s.lastModeAttempted === 'exam'){
    return { label:'Continue exam practice', body:`Keep your timing instincts warm. A second pass under the clock builds the stamina for the real test.`, mode:'exam' };
  }
  return { label:'Try an FRQ', body:`You've been drilling MCQs. Switch gears: one free-response problem, work the rubric, see your reasoning hold up.`, mode:'frq' };
}

  return { lead:`Hey.`, line:`Ready when you are.` };
}

/* ---------- TOPIC PRACTICE ---------- */
let topicState = {unit:'all', calc:'all', idx:0, selected:null, revealed:false, pool:[]};

function buildTopicPool(){
  topicState.pool = MCQ.filter(q => {
    if(topicState.unit!=='all' && q.unit!=Number(topicState.unit)) return false;
    if(topicState.calc==='nocalc' && q.calc) return false;
    if(topicState.calc==='calc' && !q.calc) return false;
    return true;
  });
  topicState.idx = 0;
  topicState.selected = null;
  topicState.revealed = false;
}

function renderTopicPractice(){
  if(topicState.pool.length===0) buildTopicPool();
  const total = topicState.pool.length;
  const q = topicState.pool[topicState.idx];

  const unitOpts = [1,2,3,4,5,6,7,8].map(u=>`<option value="${u}" ${topicState.unit==u?'selected':''}>Unit ${u}</option>`).join('');

  app.innerHTML = `
    <div class="card">
      <h2>Topic Practice</h2>
      <div class="toolbar">
        <div class="row">
          <label class="muted">Unit:</label>
          <select id="filt-unit">
            <option value="all" ${topicState.unit=='all'?'selected':''}>All units</option>
            ${unitOpts}
          </select>
          <label class="muted">Calculator:</label>
          <select id="filt-calc">
            <option value="all" ${topicState.calc=='all'?'selected':''}>All</option>
            <option value="nocalc" ${topicState.calc=='nocalc'?'selected':''}>No-calculator</option>
            <option value="calc" ${topicState.calc=='calc'?'selected':''}>Calculator-active</option>
          </select>
        </div>
        <div class="muted">${total>0 ? (topicState.idx+1) : 0} / ${total}</div>
      </div>
      <div class="progress"><div style="width:${total>0?((topicState.idx+1)/total*100):0}%"></div></div>
      ${total===0 ? '<p class="muted">No questions match your filter.</p>' : renderQuestion(q, topicState)}
      <div class="row" style="margin-top:14px">
        <button class="btn ghost" id="prev" ${topicState.idx===0?'disabled':''}>тЖР Previous</button>
        <button class="btn" id="next" ${topicState.idx===total-1?'disabled':''}>Next тЖТ</button>
        <button class="btn muted" id="shuffle">Shuffle</button>
      </div>
    </div>
  `;

  $('#filt-unit').addEventListener('change', e=>{topicState.unit=e.target.value; buildTopicPool(); renderTopicPractice();});
  $('#filt-calc').addEventListener('change', e=>{topicState.calc=e.target.value; buildTopicPool(); renderTopicPractice();});
  $('#prev')?.addEventListener('click', ()=>{topicState.idx=Math.max(0,topicState.idx-1); topicState.selected=null; topicState.revealed=false; renderTopicPractice();});
  $('#next')?.addEventListener('click', ()=>{topicState.idx=Math.min(total-1,topicState.idx+1); topicState.selected=null; topicState.revealed=false; renderTopicPractice();});
  $('#shuffle')?.addEventListener('click', ()=>{topicState.pool.sort(()=>Math.random()-0.5); topicState.idx=0; topicState.selected=null; topicState.revealed=false; renderTopicPractice();});

  bindQuestion(topicState);
  typeset();
}

function renderQuestion(q, st){
  const choices = q.choices.map((c,i)=>{
    const lab = ['A','B','C','D'][i];
    let cls = 'choice';
    if(st.revealed){
      if(i===q.ans) cls += ' correct';
      else if(i===st.selected) cls += ' wrong';
    } else if(st.selected===i) cls += ' selected';
    return `<div class="${cls}" data-i="${i}"><span class="lab">${lab}.</span> ${c}</div>`;
  }).join('');

  let feedback = '';
  if(st.revealed){
    const correct = st.selected===q.ans;
    feedback = `<div class="feedback ${correct?'right':'wrong'}">
      <strong>${correct?'Correct.':'Not quite.'}</strong>
      <div class="why">${q.exp}</div>
    </div>`;
  }

  return `
    <div class="qbox">
      <div class="qhead">
        <span class="qnum">${q.id.toUpperCase()} ┬╖ ${q.topic}</span>
        <span>
          <span class="pill unit">Unit ${q.unit}</span>
          <span class="pill ${q.calc?'calc':'nocalc'}">${q.calc?'Calculator OK':'No calculator'}</span>
        </span>
      </div>
      <div class="qstem">${q.q}</div>
      <div class="choices">${choices}</div>
      ${feedback}
      <div class="row" style="margin-top:12px">
        <button class="btn" id="check" ${st.selected===null||st.revealed?'disabled':''}>Check answer</button>
      </div>
    </div>
  `;
}

function bindQuestion(st){
  app.querySelectorAll('.choice').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(st.revealed) return;
      st.selected = Number(el.dataset.i);
      if(currentMode==='topic') renderTopicPractice();
      else if(currentMode==='exam') renderExamMCQ();
    });
  });
  $('#check')?.addEventListener('click', ()=>{
    st.revealed = true;
    // Record XP/correctness only in topic-practice (exam reveals at the end).
    if(currentMode === 'topic'){
      const q = topicState.pool[topicState.idx];
      if(q && st.selected !== null){
        APState.recordAnswer(q.unit, st.selected === q.ans);
        refreshStreakChip();
      }
    }
    if(currentMode==='topic') renderTopicPractice();
    else if(currentMode==='exam') renderExamMCQ();
  });
}

            <pre class="solution">${p.solution}</pre>
            <h3>Self-grade</h3>
            ${[...Array(p.points).keys()].map(j=>`<div class="check-row"><input type="checkbox" id="sg-${i}-${j}"> <label for="sg-${i}-${j}">I earned point ${j+1}</label></div>`).join('')}
          </div>` : ''}
      </div>
    `).join('')}
  `;
  $('#back').addEventListener('click', ()=>renderFRQList());
  app.querySelectorAll('.toggleR').forEach(b=>{
    b.addEventListener('click', ()=>{
      const i = Number(b.dataset.i);
      frqState.showSolutions[i] = !frqState.showSolutions[i];
      renderFRQ();
    });
  });
  typeset();
}

/* ---------- STUDY GUIDE ---------- */
function renderGuide(){
  app.innerHTML = `
    <div class="card">
      <h2>Study Guide</h2>
      <p class="muted">Quick-reference summary of theorems, formulas, and key facts. Tap any unit to expand.</p>
    </div>
    ${GUIDE.map(g=>`
      <div class="card">
        <details ${g.unit===1?'open':''}>
          <summary><strong>Unit ${g.unit}: ${g.title}</strong></summary>
          <table class="formula-table">
            <thead><tr><th style="width:30%">Topic</th><th>Detail</th></tr></thead>
            <tbody>
              ${g.items.map(it=>`<tr><td>${it.h}</td><td>${it.b}</td></tr>`).join('')}
            </tbody>
          </table>
        </details>
      </div>
    `).join('')}
  `;
  typeset();
}

/* ---------- PRACTICE EXAM ---------- */
let examState = null;

function newExam(){
  // Section I: 45 MCQ split тАФ 30 no-calc, 15 calc.
  const noCalc = MCQ.filter(q=>!q.calc);
  const calc = MCQ.filter(q=>q.calc);
  const partA = pickRandom(noCalc, Math.min(30, noCalc.length));
  const partB = pickRandom(calc, Math.min(15, calc.length));
  // Section II: 6 FRQ split тАФ 2 calc, 4 no-calc.
  const calcFRQ = FRQ.filter(f=>f.calc);
  const noCalcFRQ = FRQ.filter(f=>!f.calc);
  const frqA = pickRandom(calcFRQ, Math.min(2, calcFRQ.length));
  const frqB = pickRandom(noCalcFRQ, Math.min(4, noCalcFRQ.length));

  examState = {
    started: false,
    completed: false,
    section: 'A1', // A1=MCQ Part A, A2=MCQ Part B, B1=FRQ Part A, B2=FRQ Part B
    qIdx: 0,
    mcqA: partA, mcqB: partB,
    frqA, frqB,
    answers: {}, // qid -> selected idx
    timeLeft: 60*60, // section A: 60 min for 30 no-calc
    timer: null,
    sectionStart: null,
    revealAtEnd: true,
  };
}

function pickRandom(arr,n){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a.slice(0,n);
}

function fmtTime(s){
  if(s<0) s = 0;
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return (h>0?h+':':'') + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function startExamTimer(){
  if(examState.timer) clearInterval(examState.timer);
  examState.timer = setInterval(()=>{
    examState.timeLeft--;
    const t = $('#timer');
    if(t){
      t.textContent = fmtTime(examState.timeLeft);
      t.classList.toggle('warn', examState.timeLeft<=300 && examState.timeLeft>60);
      t.classList.toggle('danger', examState.timeLeft<=60);
    }
    if(examState.timeLeft<=0){ advanceSection(); }
  },1000);
}

function advanceSection(){
  if(examState.timer) clearInterval(examState.timer);
  if(examState.section==='A1'){ examState.section='A2'; examState.qIdx=0; examState.timeLeft=45*60; renderExamMCQ(); }
  else if(examState.section==='A2'){ examState.section='B1'; examState.qIdx=0; examState.timeLeft=30*60; renderExamFRQ(); }
  else if(examState.section==='B1'){ examState.section='B2'; examState.qIdx=0; examState.timeLeft=60*60; renderExamFRQ(); }
  else if(examState.section==='B2'){ finishExam(); }
}

function renderExamLanding(){
  if(!examState || examState.completed){ newExam(); }
  if(examState.started){
    if(examState.section==='A1' || examState.section==='A2') renderExamMCQ();
    else renderExamFRQ();
    return;
  }
  app.innerHTML = `
    <div class="card">
      <h2>Full Practice Exam</h2>
      <p class="muted">Mirrors the real exam in structure, pacing, and difficulty.</p>
      <h3>Format</h3>
      <table class="formula-table">
        <thead><tr><th>Section</th><th>Questions</th><th>Time</th><th>Calculator</th></tr></thead>
        <tbody>
          <tr><td>I тАФ Part A</td><td>30 MCQ</td><td>60 min</td><td>Not allowed</td></tr>
          <tr><td>I тАФ Part B</td><td>15 MCQ</td><td>45 min</td><td>Required</td></tr>
          <tr><td>II тАФ Part A</td><td>2 FRQ</td><td>30 min</td><td>Required</td></tr>
          <tr><td>II тАФ Part B</td><td>4 FRQ</td><td>60 min</td><td>Not allowed</td></tr>
        </tbody>
      </table>
      <p class="muted">The exam draws from the question banks (Unit 1тАУ8). Each attempt randomizes selections.</p>
      <div class="row" style="margin-top:12px">
        <button class="btn" id="startExam">Begin exam</button>
        <span class="muted">Total: 3 hr 15 min</span>
      </div>
    </div>
  `;
  $('#startExam').addEventListener('click', ()=>{ examState.started=true; renderExamMCQ(); startExamTimer(); });
}

function currentMCQList(){
  return examState.section==='A1' ? examState.mcqA : examState.mcqB;
}
function currentFRQList(){
  return examState.section==='B1' ? examState.frqA : examState.frqB;
}

function renderExamMCQ(){
  const list = currentMCQList();
  const q = list[examState.qIdx];
  const selected = examState.answers[q.id];
  const sectName = examState.section==='A1' ? 'Section I, Part A тАФ No Calculator' : 'Section I, Part B тАФ Calculator Required';
  const choices = q.choices.map((c,i)=>{
    const lab = ['A','B','C','D'][i];
    const cls = 'choice' + (selected===i?' selected':'');
    return `<div class="${cls}" data-i="${i}"><span class="lab">${lab}.</span> ${c}</div>`;
  }).join('');

  const palette = list.map((qq,i)=>{
    const a = examState.answers[qq.id];
    const cls = i===examState.qIdx ? 'btn' : (a!==undefined ? 'btn muted' : 'btn ghost');
    return `<button class="${cls}" data-jump="${i}" style="padding:6px 10px;font-size:12px;min-width:32px">${i+1}</button>`;
  }).join(' ');

  app.innerHTML = `
    <div class="card">
      <div class="toolbar">
        <div>
          <div class="muted" style="font-size:12px;letter-spacing:.05em;text-transform:uppercase">${sectName}</div>
          <h2 style="margin:4px 0 0">Question ${examState.qIdx+1} of ${list.length}</h2>
        </div>
        <div class="row">
          <span id="timer" class="timer">${fmtTime(examState.timeLeft)}</span>
          <button class="btn warn" id="endSec">End section</button>
        </div>
      </div>
      <div class="qbox">
        <div class="qhead">
          <span class="qnum">${q.topic}</span>
          <span class="pill ${q.calc?'calc':'nocalc'}">${q.calc?'Calculator':'No calculator'}</span>
        </div>
        <div class="qstem">${q.q}</div>
        ${choices}
      </div>
      <div class="row" style="justify-content:space-between;margin-top:14px">
        <button class="btn ghost" id="prev" ${examState.qIdx===0?'disabled':''}>тЖР Previous</button>
        <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;flex:1">${palette}</div>
        <button class="btn" id="next">${examState.qIdx===list.length-1?'Finish section':'Next тЖТ'}</button>
      </div>
    </div>
  `;
  app.querySelectorAll('.choice').forEach(el=>{
    el.addEventListener('click', ()=>{
      examState.answers[q.id] = Number(el.dataset.i);
      renderExamMCQ();
    });
  });
  $('#prev').addEventListener('click', ()=>{ if(examState.qIdx>0){ examState.qIdx--; renderExamMCQ(); }});
  $('#next').addEventListener('click', ()=>{
    if(examState.qIdx===list.length-1){ advanceSection(); }
    else { examState.qIdx++; renderExamMCQ(); }
  });
  $('#endSec').addEventListener('click', ()=>{
    if(confirm('End this section and move to the next? Your time for the next section will start fresh.')) advanceSection();
  });
  app.querySelectorAll('[data-jump]').forEach(b=>b.addEventListener('click', ()=>{
    examState.qIdx = Number(b.dataset.jump); renderExamMCQ();
  }));
  typeset();
}

function renderExamFRQ(){
  const list = currentFRQList();
  const f = list[examState.qIdx];
  const sectName = examState.section==='B1' ? 'Section II, Part A тАФ Calculator Required' : 'Section II, Part B тАФ No Calculator';
  app.innerHTML = `
    <div class="card">
      <div class="toolbar">
        <div>
          <div class="muted" style="font-size:12px;letter-spacing:.05em;text-transform:uppercase">${sectName}</div>
          <h2 style="margin:4px 0 0">FRQ ${examState.qIdx+1} of ${list.length}: ${f.title}</h2>
        </div>
        <div class="row">
          <span id="timer" class="timer">${fmtTime(examState.timeLeft)}</span>
          <button class="btn warn" id="endSec">End section</button>
        </div>
      </div>
      <p style="margin-top:8px"><strong>Context.</strong> ${f.context}</p>
      ${f.parts.map(p=>`
        <div class="frq-part" style="margin-top:8px">
          <div class="row" style="justify-content:space-between"><strong>${p.label}</strong><span class="pill">${p.points} pt${p.points>1?'s':''}</span></div>
          <div style="margin-top:4px">${p.q}</div>
        </div>
      `).join('')}
      <p class="muted" style="margin-top:10px">Work this problem on paper. After the exam ends you'll be able to grade yourself with the rubric.</p>
      <div class="row" style="justify-content:space-between;margin-top:14px">
        <button class="btn ghost" id="prev" ${examState.qIdx===0?'disabled':''}>тЖР Previous</button>
        <button class="btn" id="next">${examState.qIdx===list.length-1?'Finish section':'Next тЖТ'}</button>
      </div>
    </div>
  `;
  $('#prev').addEventListener('click', ()=>{ if(examState.qIdx>0){ examState.qIdx--; renderExamFRQ(); }});
  $('#next').addEventListener('click', ()=>{
    if(examState.qIdx===list.length-1){ advanceSection(); }
    else { examState.qIdx++; renderExamFRQ(); }
  });
  $('#endSec').addEventListener('click', ()=>{
    if(confirm('End this section and move on?')) advanceSection();
  });
  typeset();
}

function finishExam(){
  if(examState.timer) clearInterval(examState.timer);
  examState.completed = true;
  // Score MCQ.
  const allMC = examState.mcqA.concat(examState.mcqB);
  let correct = 0;
  allMC.forEach(q=>{ if(examState.answers[q.id]===q.ans) correct++; });
  const totalMC = allMC.length;
  const pct = totalMC>0 ? Math.round(100*correct/totalMC) : 0;

  // Approximate AP score (1тАУ5) using common cutoffs (rough).
  // MCQ counts for ~50% of score. Without graded FRQ here, we estimate from MCQ only.
  let estScore = 1;
  if(pct>=72) estScore=5;
  else if(pct>=58) estScore=4;
  else if(pct>=44) estScore=3;
  else if(pct>=30) estScore=2;

  app.innerHTML = `
    <div class="card">
      <h2>Exam complete</h2>
      <div class="scorebox">
        <div>
          <div class="muted" style="color:#a3aac3">Multiple-choice score</div>
          <div class="big">${correct} / ${totalMC}</div>
        </div>
        <div>
          <div class="muted" style="color:#a3aac3">Approx. AP score (MCQ only)</div>
          <div class="big">${estScore}</div>
        </div>
      </div>
      <p class="muted">This estimate uses only the MCQ portion. Use the FRQ rubrics below to self-grade your free-response work, then aim for a balanced total of ~108/108 to estimate your overall AP score.</p>
      <h3>Multiple-choice review</h3>
      <p class="muted">Review every question with the correct answer and explanation:</p>
      <div id="mcReview"></div>
      <h3>FRQ self-grading</h3>
      <p class="muted">Compare your written work to the rubric and model solution:</p>
      <div id="frqReview"></div>
      <div class="row" style="margin-top:14px">
        <button class="btn" id="newAttempt">Start a new exam</button>
      </div>
    </div>
  `;

  // MC review
  const mcDiv = $('#mcReview');
  mcDiv.innerHTML = allMC.map((q,i)=>{
    const sel = examState.answers[q.id];
    const got = sel===q.ans;
    return `
      <div class="qbox">
        <div class="qhead">
          <span class="qnum">Q${i+1} ┬╖ ${q.topic}</span>
          <span class="pill ${q.calc?'calc':'nocalc'}">${q.calc?'Calculator':'No calculator'}</span>
        </div>
        <div class="qstem">${q.q}</div>
        ${q.choices.map((c,j)=>{
          let cls='choice';
          if(j===q.ans) cls+=' correct';
          else if(j===sel) cls+=' wrong';
          return `<div class="${cls}"><span class="lab">${['A','B','C','D'][j]}.</span> ${c}</div>`;
        }).join('')}
        <div class="feedback ${got?'right':'wrong'}">
          <strong>${got?'Correct':(sel===undefined?'Not answered':'Incorrect')}</strong>
          <div class="why">${q.exp}</div>
        </div>
      </div>`;
  }).join('');

  // FRQ review
  const frqList = examState.frqA.concat(examState.frqB);
  $('#frqReview').innerHTML = frqList.map((f,fi)=>`
    <div class="qbox">
      <div class="qhead">
        <span class="qnum">FRQ ${fi+1} ┬╖ Unit ${f.unit}</span>
        <span class="pill ${f.calc?'calc':'nocalc'}">${f.calc?'Calculator':'No calculator'}</span>
      </div>
      <div style="font-weight:600">${f.title}</div>
      <p style="margin-top:6px">${f.context}</p>
      ${f.parts.map((p,pi)=>`
        <details style="margin-top:8px">
          <summary><strong>${p.label}</strong> (${p.points} pts) тАФ ${p.q.replace(/<[^>]+>/g,'').slice(0,80)}тАж</summary>
          <h3>Rubric</h3><ul class="rubric">${p.rubric.map(r=>`<li>${r}</li>`).join('')}</ul>
          <h3>Model solution</h3><pre class="solution">${p.solution}</pre>
        </details>
      `).join('')}
    </div>
  `).join('');

  $('#newAttempt').addEventListener('click', ()=>{ examState=null; renderExamLanding(); });
  typeset();
}

/* ---------- INIT ---------- */
renderHome();
</script>
